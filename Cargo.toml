[package]
name = "USBackup"
version = "0.1.0"
edition = "2024"

[dependencies]
nusb = "0.2.3"
futures-lite = "2.6.0"
chrono = "0.4"
colored = "3.1.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
notify-rust = "4.11"
ratatui = "0.30.0"
crossterm = { version = "0.29", features = ["event-stream"] }
ureq = "3.3.0"
sysinfo = "0.38.4"
udev = "0.9.3"
env_logger = "0.11.10"
log = "0.4.29"
tokio = { version = "1.52.1", features = ["full"] }
