name: Build & Release

on:
    workflow_dispatch:
        inputs:
            tag_name:
                description: "Version tag (e.g. v0.1.0)"
                required: true

env:
    CARGO_TERM_COLOR: always

jobs:
    release:
        name: Build & Release
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact_name: usbackup-linux-amd64
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact_name: usbackup-win64.exe

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install dependencies (Linux)
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libudev-dev pkg-config

            - name: Build
              run: cargo build --release --target ${{ matrix.target }}

            - name: Generate .deb package
              if: matrix.os == 'ubuntu-latest'
              run: |
                  cargo install cargo-deb
                  cargo deb --target ${{ matrix.target }} --no-build
                  mv target/${{ matrix.target }}/debian/*.deb target/${{ matrix.target }}/release/usbackup.deb

            - name: Generate .rpm package
              if: matrix.os == 'ubuntu-latest'
              run: |
                  cargo install cargo-generate-rpm
                  cargo generate-rpm --target ${{ matrix.target }}
                  mv target/${{ matrix.target }}/generate-rpm/*.rpm target/${{ matrix.target }}/release/usbackup.rpm

            - name: Rename binary (Linux)
              if: matrix.os == 'ubuntu-latest'
              run: mv target/${{ matrix.target }}/release/USBackup target/${{ matrix.target
                  }}/release/${{ matrix.artifact_name }}

            - name: Rename binary (Windows)
              if: matrix.os == 'windows-latest'
              run: mv target/${{ matrix.target }}/release/USBackup.exe target/${{
                  matrix.target }}/release/${{ matrix.artifact_name }}

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: |
                      target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
                      target/${{ matrix.target }}/release/*.deb
                      target/${{ matrix.target }}/release/*.rpm

    github-release:
        name: Create GitHub Release
        needs: release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.event.inputs.tag_name }}
                  name: Release ${{ github.event.inputs.tag_name }}
                  files: |
                      artifacts/**/*
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
